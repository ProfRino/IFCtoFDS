<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>IFCtoFDS walk preview check</title>
    <style>
        html,
        body,
        #viewer {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        #walk-toggle {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 5;
        }

        #test-result {
            position: fixed;
            top: 12px;
            left: 72px;
            z-index: 5;
            padding: 4px 6px;
            background: #fff;
            font: 12px monospace;
        }

        #walk-hud {
            position: fixed;
            bottom: 12px;
            left: 50%;
            z-index: 5;
            transform: translateX(-50%);
            padding: 6px 10px;
            background: #fff;
        }
    </style>
</head>
<body>
    <button id="walk-toggle" type="button">Walk</button>
    <output id="test-result"></output>
    <div id="viewer"></div>
    <div id="walk-hud" hidden><span id="walk-hud-status"></span></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script src="../js/core/namespace.js"></script>
    <script src="../js/viewer/scene-viewer.js"></script>
    <script>
        var viewer = new window.IfcFds.viewer.SceneViewer(document.getElementById('viewer'));
        viewer.loadFdsModel({
            meshes: [{ id: 'Domain', xb: [-2, 7, -3, 3, -0.2, 4] }],
            obsts: [
                { id: 'Floor', xb: [-2, 7, -3, 3, -0.2, 0] },
                { id: 'Wall left of door', xb: [1.9, 2.1, -3, -0.65, 0, 3] },
                { id: 'Wall right of door', xb: [1.9, 2.1, 0.65, 3, 0, 3] },
                { id: 'Wall above door', xb: [1.9, 2.1, -0.65, 0.65, 2.1, 3] },
                { id: 'Step 1', xb: [3, 3.45, 1.1, 2.1, 0, 0.2] },
                { id: 'Step 2', xb: [3.45, 3.9, 1.1, 2.1, 0, 0.4] },
                { id: 'Step 3', xb: [3.9, 4.35, 1.1, 2.1, 0, 0.6] },
                { id: 'Step 4', xb: [4.35, 4.8, 1.1, 2.1, 0, 0.8] }
            ],
            vents: [],
            holes: [],
            geoms: [],
            bounds: { xmin: -2, xmax: 7, ymin: -3, ymax: 3, zmin: -0.2, zmax: 4 },
            diagnostics: []
        });
        viewer.setFdsOpacity(1);
        var doorPassage = viewer.resolveWalkHorizontal(new THREE.Vector3(0, 1.65, 0), 3, 0);
        var wallBlock = viewer.resolveWalkHorizontal(new THREE.Vector3(0, 1.65, 1.5), 3, 1.5);
        var stairHeight = viewer.walkRaycastDown(3.65, 1.5, 2);
        document.getElementById('test-result').textContent = [
            doorPassage.x > 2.9 ? 'door:pass' : 'door:blocked',
            wallBlock.x < 1.7 ? 'wall:block' : 'wall:failed',
            Math.abs(stairHeight - 0.4) < 0.01 ? 'stairs:rise' : 'stairs:failed'
        ].join(' | ');
        document.getElementById('walk-toggle').addEventListener('click', function () {
            viewer.setNavigationMode(viewer.navigationMode === 'walk' ? 'orbit' : 'walk');
        });
    </script>
</body>
</html>
